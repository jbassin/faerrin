# Monorepo CI — plain GitHub Actions (no Dagger).
#
# Every gate runs as its own job so they execute in PARALLEL (wall time ≈ the
# slowest job, not the sum). Each job restores a Bun dependency cache via the
# shared composite at .github/actions/setup, so installs are warm on repeat runs.
#
# Environment notes:
#  - Most jobs run on ubuntu-latest with pinned Bun (1.3.14).
#  - `build` + `visual-regression` also cache + install Playwright Chromium
#    (strider renders an OG image, vellum renders statblocks).
#  - `visual-regression` runs INSIDE the pinned `oven/bun:1.3.14` container
#    because vellum's golden images were generated there — a different OS/font
#    stack would fail the perceptual compare. Regenerate goldens in that same
#    environment with: `bun --filter @faerrin/vellum visual-regression -- --update`.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun --filter '*' typecheck

  astro-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun --filter '*' check # astro check + prettier (aether, face)

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun --filter '*' lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun --filter '*' test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Chromium (strider OG render)
        run: bunx playwright install --with-deps chromium
      - run: bun --filter '*' build

  visual-regression:
    runs-on: ubuntu-latest
    # Pinned container = the environment vellum's goldens were generated in.
    container:
      image: oven/bun:1.3.14
    env:
      BUN_INSTALL_CACHE_DIR: /bun-cache
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    steps:
      - name: Ensure git (for checkout inside the container)
        run: command -v git >/dev/null || (apt-get update && apt-get install -y git)
      - uses: actions/checkout@v4
      - name: Restore bun dependency cache
        uses: actions/cache@v4
        with:
          path: /bun-cache
          key: bun-container-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-container-
      - run: bun install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: /ms-playwright
          key: playwright-container-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-container-
      - run: bunx playwright install --with-deps chromium
      - run: bun --filter @faerrin/vellum build
      - run: bun --filter @faerrin/vellum visual-regression
