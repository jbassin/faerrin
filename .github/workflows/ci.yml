# Monorepo CI (GitHub Actions). The pipeline is defined as a Dagger TypeScript
# module at the repo root (.dagger/), so the exact same steps run locally
# (`dagger call check` / `dagger call build`) and in CI — no local-vs-CI drift.
# jj is git-colocated, so CI clones the git side normally; no jj-specific handling.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # typecheck → astro check → lint → test for every app, inside a pinned
      # oven/bun:1.3.14 container provisioned by Dagger (see .dagger/src/index.ts).
      - name: Check (Dagger)
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.21.4"
          call: check --source=.

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      # Builds every site (aether, strider, face). strider's build renders
      # an OG image via Playwright, so the Dagger build function installs Chromium
      # inside the container. aether builds astro against committed content/; the
      # production remote-ingest pipeline (pkg/aether/build.sh) is intentionally
      # NOT run in CI.
      - name: Build (Dagger)
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.21.4"
          call: build --source=.
