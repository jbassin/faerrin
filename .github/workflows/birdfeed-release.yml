# Release the birdfeed Stream Deck plugin as an installable .streamDeckPlugin.
#
# Separate from ci.yml (the test/build gates), this is a publish workflow: it
# builds + packs pkg/birdfeed and attaches the artifact to a GitHub Release. The
# Elgato CLI is a Node tool that pins Node 20/24 and is not part of the bun build
# lanes, so packing lives in its own workflow.
#
# It only ever releases when birdfeed actually changed since the LAST birdfeed
# release — gated twice: the `paths:` trigger skips pushes that don't touch
# pkg/birdfeed at all, and the `gate` job diffs HEAD against the most recent
# `birdfeed-v*` tag so repeat pushes without a real birdfeed change don't release.
name: birdfeed release

on:
  push:
    branches: [main]
    paths:
      - "pkg/birdfeed/**"
  workflow_dispatch: # allow a manual release (e.g. first run, or to re-pack)

permissions:
  contents: write # create tags + releases

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.decide.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history + tags to diff against the last release
      - name: Decide whether birdfeed changed since the last release
        id: decide
        run: |
          set -euo pipefail
          last="$(git tag -l 'birdfeed-v*' --sort=-creatordate | head -n1 || true)"
          if [ -z "$last" ]; then
            echo "No previous birdfeed release tag found — will release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif ! git diff --quiet "$last" HEAD -- pkg/birdfeed; then
            echo "pkg/birdfeed changed since $last — will release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pkg/birdfeed unchanged since $last — skipping release."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: gate
    if: needs.gate.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # match the CI bun version

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      # Don't ship a broken plugin: re-run birdfeed's own gates before packing.
      - name: Verify birdfeed (typecheck + test)
        run: |
          bun run --filter @faerrin/birdfeed typecheck
          bun run --filter @faerrin/birdfeed test

      # A MONOTONIC version (the workflow run number) is stamped into the packaged manifest so the
      # Stream Deck app treats each new .streamDeckPlugin as an in-place UPGRADE (settings preserved)
      # rather than a fresh install — no uninstall/re-add-key dance.
      - name: Compute version
        id: meta
        run: |
          set -euo pipefail
          version="0.1.${GITHUB_RUN_NUMBER}.0"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=birdfeed-v${version}" >> "$GITHUB_OUTPUT"

      # rollup bundle → bin/plugin.js, then `streamdeck pack --version` → dist/*.streamDeckPlugin.
      # --ignore-validation: the placeholder icons are SVG; the validator wants PNG. The plugin
      # installs and runs fine (keys are painted at runtime) — only the static catalog icons are
      # cosmetic. Replace imgs/* with real PNGs to drop the flag.
      - name: Build & pack plugin (stamped version)
        run: |
          set -euo pipefail
          bun run --filter @faerrin/birdfeed bundle
          cd pkg/birdfeed
          bunx @elgato/cli pack com.faerrin.birdfeed.sdPlugin \
            --output dist --force --no-update-check --ignore-validation \
            --version "${{ steps.meta.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.meta.outputs.tag }}" \
            pkg/birdfeed/dist/com.faerrin.birdfeed.streamDeckPlugin \
            --target "${GITHUB_SHA}" \
            --title "birdfeed ${{ steps.meta.outputs.tag }}" \
            --notes "Stream Deck plugin build for \`@faerrin/birdfeed\` (v${{ steps.meta.outputs.version }}) from commit ${GITHUB_SHA}.

          **Install / update:** download \`com.faerrin.birdfeed.streamDeckPlugin\` below and double-click it. Because each release has a higher version, the Stream Deck app updates the plugin **in place** and keeps your API key — no need to uninstall the previous version. Then (first time only) set the lark API key in the action's settings.

          _Auto-generated because \`pkg/birdfeed/**\` changed since the previous birdfeed release._"
